<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Inbox — Secret Letter</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="splash"><div class="splash-seal"></div></div>
  <div id="offline-banner" class="offline-banner">You're offline — some things may not work.</div>
  <div id="toast-container"></div>

  <nav class="navbar row-between">
    <div class="logo"><span>Secret</span><span class="dot">Letter</span></div>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">🌙</button>
  </nav>

  <main class="container page-enter has-tabbar">

    <div class="row-between" style="padding: var(--space-4) 0 var(--space-3);">
      <div>
        <span class="eyebrow">Your inbox</span>
        <h1 style="margin-top: 4px;">Letters<span id="unread-badge" class="badge" style="margin-left: 8px; display: none;">0</span></h1>
      </div>
    </div>

    <!-- Search -->
    <div class="field" style="margin-bottom: var(--space-4);">
      <input class="input" type="search" id="search-input" placeholder="Search your letters…" />
    </div>

    <!-- Skeleton loading -->
    <div id="skeleton-list" class="stack">
      <div class="glass glass-card"><div class="skeleton skeleton-line" style="width: 90%;"></div><div class="skeleton skeleton-line" style="width: 60%;"></div></div>
      <div class="glass glass-card"><div class="skeleton skeleton-line" style="width: 80%;"></div><div class="skeleton skeleton-line" style="width: 50%;"></div></div>
      <div class="glass glass-card"><div class="skeleton skeleton-line" style="width: 95%;"></div><div class="skeleton skeleton-line" style="width: 40%;"></div></div>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state" style="display: none;">
      <span class="icon">📭</span>
      <h3>No letters yet</h3>
      <p>Share your link and the first one will land here.</p>
      <a href="dashboard.html" class="btn btn-primary" style="margin-top: var(--space-3);">Copy your link</a>
    </div>

    <!-- No search results -->
    <div id="no-results-state" class="empty-state" style="display: none;">
      <span class="icon">🔍</span>
      <h3>No matches</h3>
      <p>Try a different search term.</p>
    </div>

    <!-- Message list -->
    <div id="message-list" class="stack"></div>

    <!-- Load more sentinel -->
    <div id="load-sentinel" style="height: 1px;"></div>
    <div id="loading-more" class="center" style="display: none; padding: var(--space-4) 0;">
      <div class="spinner"></div>
    </div>

  </main>

  <nav class="tab-bar">
    <a href="dashboard.html" class="tab-item">🏠<span>Home</span></a>
    <a href="inbox.html" class="tab-item active">📬<span>Inbox</span></a>
    <a href="profile.html" class="tab-item">🪞<span>Profile</span></a>
    <a href="settings.html" class="tab-item">⚙️<span>Settings</span></a>
  </nav>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import {
      collection,
      query,
      orderBy,
      limit,
      startAfter,
      getDocs,
      doc,
      deleteDoc,
      updateDoc,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";
    import {
      requireAuth,
      initTheme,
      initOfflineBanner,
      hideSplash,
      attachRipples,
      showToast,
      formatRelativeTime,
      escapeHtml,
      requestNotificationPermission,
      showSystemNotification
    } from "./script.js";

    initTheme();
    initOfflineBanner();
    attachRipples();

    document.getElementById("theme-toggle").addEventListener("click", () => {
      const html = document.documentElement;
      const next = html.getAttribute("data-theme") === "light" ? "dark" : "light";
      html.setAttribute("data-theme", next);
      localStorage.setItem("sl-theme", next);
    });

    const PAGE_SIZE = 15;
    let uid = null;
    let lastDoc = null;
    let allLoaded = false;
    let isFetching = false;
    let loadedMessages = []; // { id, text, timestamp, read }
    let searchTerm = "";

    const listEl = document.getElementById("message-list");
    const skeletonEl = document.getElementById("skeleton-list");
    const emptyEl = document.getElementById("empty-state");
    const noResultsEl = document.getElementById("no-results-state");
    const loadingMoreEl = document.getElementById("loading-more");
    const unreadBadge = document.getElementById("unread-badge");

    requireAuth((user) => {
      uid = user.uid;
      watchUnreadCount();
      loadPage(true);
      requestNotificationPermission();
      watchForNewLetters(uid);
    });

    // Notify for letters arriving while this page is open, and prepend
    // them live to the list so the inbox doesn't need a manual refresh.
    const sessionStart = Date.now();
    let isFirstLetterSnapshot = true;

    function watchForNewLetters(userUid) {
      const q = query(collection(db, "users", userUid, "messages"), orderBy("timestamp", "desc"), limit(10));
      onSnapshot(q, (snap) => {
        if (isFirstLetterSnapshot) {
          isFirstLetterSnapshot = false;
          return;
        }
        snap.docChanges().forEach((change) => {
          if (change.type !== "added") return;
          const data = change.doc.data();
          const arrivedMs = data.timestamp?.toDate ? data.timestamp.toDate().getTime() : Date.now();
          if (arrivedMs < sessionStart) return;
          if (loadedMessages.some((m) => m.id === change.doc.id)) return;

          loadedMessages.unshift({ id: change.doc.id, ...data });
          render();
          showToast("A new letter just arrived! 💌", "success");
          showSystemNotification("New letter", "Someone sent you an anonymous letter.");
        });
      });
    }

    // Live unread badge — separate lightweight listener over the same
    // subcollection, filtered client-side since it's a small personal inbox.
    function watchUnreadCount() {
      const q = query(collection(db, "users", uid, "messages"), orderBy("timestamp", "desc"), limit(200));
      onSnapshot(q, (snap) => {
        const unread = snap.docs.filter((d) => d.data().read === false).length;
        if (unread > 0) {
          unreadBadge.style.display = "inline-flex";
          unreadBadge.textContent = unread > 99 ? "99+" : unread;
        } else {
          unreadBadge.style.display = "none";
        }
      });
    }

    async function loadPage(isFirst = false) {
      if (isFetching || allLoaded) return;
      isFetching = true;
      if (!isFirst) loadingMoreEl.style.display = "flex";

      try {
        let q = query(collection(db, "users", uid, "messages"), orderBy("timestamp", "desc"), limit(PAGE_SIZE));
        if (lastDoc) q = query(collection(db, "users", uid, "messages"), orderBy("timestamp", "desc"), startAfter(lastDoc), limit(PAGE_SIZE));

        const snap = await getDocs(q);
        if (snap.empty) {
          allLoaded = true;
        } else {
          lastDoc = snap.docs[snap.docs.length - 1];
          snap.docs.forEach((d) => {
            loadedMessages.push({ id: d.id, ...d.data() });
          });
          if (snap.docs.length < PAGE_SIZE) allLoaded = true;
        }
        render();
      } catch (err) {
        console.error(err);
        showToast("Couldn't load your letters.", "error");
      } finally {
        isFetching = false;
        loadingMoreEl.style.display = "none";
        skeletonEl.style.display = "none";
        hideSplash();
      }
    }

    function render() {
      const filtered = searchTerm
        ? loadedMessages.filter((m) => m.text.toLowerCase().includes(searchTerm))
        : loadedMessages;

      if (loadedMessages.length === 0) {
        emptyEl.style.display = "flex";
        noResultsEl.style.display = "none";
        listEl.innerHTML = "";
        return;
      }
      emptyEl.style.display = "none";

      if (filtered.length === 0) {
        noResultsEl.style.display = "flex";
        listEl.innerHTML = "";
        return;
      }
      noResultsEl.style.display = "none";

      // Pinned letters float to the top, newest-first within each group.
      const sorted = [...filtered].sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));

      listEl.innerHTML = sorted.map((m) => `
        <div class="letter-card ${m.read ? "" : "is-unread"}" data-id="${m.id}">
          <span class="seal" style="${m.read ? "display:none;" : ""}"></span>
          <p style="color: var(--text); white-space: pre-wrap;">${escapeHtml(m.text)}</p>
          ${renderHintChip(m.hint)}
          <div class="row-between" style="margin-top: var(--space-3);">
            <span style="font-size: var(--fs-xs); color: var(--text-muted);">${formatRelativeTime(m.timestamp)}</span>
            <div class="row" style="gap: 8px;">
              <button class="btn btn-ghost pin-btn" data-id="${m.id}" style="padding: 4px 8px; ${m.pinned ? "color: var(--seal);" : ""}" aria-label="Pin">${m.pinned ? "📌" : "📍"}</button>
              <button class="btn btn-ghost copy-btn" data-id="${m.id}" style="padding: 4px 8px;" aria-label="Copy">📋</button>
              <button class="btn btn-ghost delete-btn" data-id="${m.id}" style="padding: 4px 8px; color: var(--danger);" aria-label="Delete">🗑</button>
            </div>
          </div>
        </div>
      `).join("");

      attachRipples();
      wireCardActions();
    }

    // A small, non-identifying flavor chip — never anything that could
    // narrow down a specific person, just enough for a bit of texture.
    function renderHintChip(hint) {
      if (!hint) return "";
      const parts = [];
      if (hint.device) parts.push(hint.device === "Mobile" ? "📱 Mobile" : "🖥️ Desktop");
      if (hint.browser) parts.push(hint.browser);
      if (hint.region) parts.push(`near ${escapeHtml(hint.region)}`);
      if (parts.length === 0) return "";
      return `<p class="chip" style="margin-top: var(--space-2); width: fit-content;"><strong style="color: var(--accent-strong);">Hint:</strong>&nbsp;${parts.join(" · ")}</p>`;
    }

    function wireCardActions() {
      document.querySelectorAll(".letter-card[data-id]").forEach((card) => {
        const id = card.dataset.id;
        card.style.cursor = "pointer";
        card.addEventListener("click", () => {
          const msg = loadedMessages.find((m) => m.id === id);
          if (msg && !msg.read) markRead(id, card);
          card.classList.toggle("expanded");
        });
      });

      document.querySelectorAll(".pin-btn").forEach((btn) => {
        btn.addEventListener("click", async (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          const msg = loadedMessages.find((m) => m.id === id);
          if (!msg) return;
          const nextPinned = !msg.pinned;
          msg.pinned = nextPinned;
          render();
          try {
            await updateDoc(doc(db, "users", uid, "messages", id), { pinned: nextPinned });
          } catch (err) {
            console.error(err);
            msg.pinned = !nextPinned;
            render();
            showToast("Couldn't update pin. Try again.", "error");
          }
        });
      });

      document.querySelectorAll(".copy-btn").forEach((btn) => {
        btn.addEventListener("click", async (e) => {
          e.stopPropagation();
          const msg = loadedMessages.find((m) => m.id === btn.dataset.id);
          if (msg) {
            await navigator.clipboard.writeText(msg.text);
            showToast("Copied to clipboard.", "success");
          }
        });
      });

      document.querySelectorAll(".delete-btn").forEach((btn) => {
        btn.addEventListener("click", async (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          if (!confirm("Delete this letter? This can't be undone.")) return;
          try {
            await deleteDoc(doc(db, "users", uid, "messages", id));
            loadedMessages = loadedMessages.filter((m) => m.id !== id);
            render();
            showToast("Letter deleted.", "success");
          } catch (err) {
            console.error(err);
            showToast("Couldn't delete. Try again.", "error");
          }
        });
      });
    }

    async function markRead(id, cardEl) {
      const msg = loadedMessages.find((m) => m.id === id);
      if (!msg || msg.read) return;
      cardEl.classList.add("unsealed");
      msg.read = true;
      try {
        await updateDoc(doc(db, "users", uid, "messages", id), { read: true });
      } catch (err) {
        console.error(err);
      }
    }

    // Search
    let searchDebounce;
    document.getElementById("search-input").addEventListener("input", (e) => {
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(() => {
        searchTerm = e.target.value.trim().toLowerCase();
        render();
      }, 200);
    });

    // Infinite scroll via IntersectionObserver
    const observer = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting) loadPage(false);
    }, { rootMargin: "200px" });
    observer.observe(document.getElementById("load-sentinel"));
  </script>
</body>
</html>
